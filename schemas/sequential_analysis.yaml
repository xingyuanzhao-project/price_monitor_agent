schema_id: sequential_analysis
name: Sequential Analysis Pipeline
description: Two agents in sequence — first gathers context, second analyzes.
nodes:
  - node_id: data_gatherer
    node_type: agent
    label: Data Gatherer
    config:
      model_id: google/gemini-2.5-flash-lite
      temperature: 0.3
      max_tokens: 2048
      agent_rules:
        - Collect and structure relevant market information
        - Output must be factual and well-organized
      retries: 2
      backoff_multiplier: 1.5
      termination_conditions:
        - Data collection is sufficient for analysis
      max_iterations: 5
    position:
      x: 200
      y: 150
  - node_id: analyst
    node_type: agent
    label: Senior Analyst
    config:
      model_id: google/gemini-2.5-flash-lite
      temperature: 0.7
      max_tokens: 2048
      agent_rules:
        - Produce a structured analysis based on the gathered data
        - Include risk assessment and confidence level
      retries: 2
      backoff_multiplier: 1.5
      termination_conditions:
        - Analysis includes both bullish and bearish scenarios
      max_iterations: 5
    position:
      x: 500
      y: 150
edges:
  - edge_id: data_to_analyst
    edge_type: data_flow
    source_node_id: data_gatherer
    target_node_id: analyst
config:
  total_timeout: 120
  logging_level: info
  trace_enabled: true
  dead_loop_detection: true
