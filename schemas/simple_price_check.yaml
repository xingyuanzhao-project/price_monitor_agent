schema_id: simple_price_check
name: Simple Price Check
description: Single agent that summarizes current market conditions.
nodes:
  - node_id: analyst
    node_type: agent
    label: Market Analyst
    config:
      model_id: google/gemini-2.5-flash-lite
      temperature: 0.5
      max_tokens: 1024
      instruction:
        - Provide a concise summary of market conditions
        - Include current price direction and key levels
      retries: 2
      retry_waiting_time: 1.5
      termination_conditions:
        - Summary is complete with price analysis
      max_iterations: 3
    position:
      x: 300
      y: 200
edges: []
config:
  total_timeout: 60
  logging_level: info
  trace_enabled: true
  dead_loop_detection: true
